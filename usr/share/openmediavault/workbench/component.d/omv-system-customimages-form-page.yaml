version: "1.0"
type: component
data:
  name: omv-system-customimages-form-page
  type: formPage
  config:
    request:
      service: CustomImages
      get:
        method: getSettings
      post:
        method: setSettings
    hints:
      - type: info
        text: _("A set of images is provided in /usr/share/openmediavault/customimages/, named login.jpg, standby.jpg, and shutdown.jpg.<br/>Default images are in /usr/share/openmediavault/customimages/default/, named accordingly.")
        dismissible: true
    fields:
      - type: divider
        title: _('Image Folder')
      - type: hidden
        name: rootfsref
        value: "79684322-3eac-11ea-a974-63a080abab18"
        submitValue: false
      - type: folderBrowser
        name: imagefolder
        label: _('Custom images folder')
        hint: _('Absolute path to the folder containing the custom images, e.g., /srv/dev-disk-by-uuid-xxx/some/path/')
        value: '/usr/share/openmediavault/customimages/'
        dirType: mntent
        dirRefIdField: rootfsref
      - type: divider
        title: _('Login Screen')
      - type: textInput
        name: loginimage
        label: _('Login screen image')
        hint: _('Filename of the JPEG image, e.g., login.jpg')
        value: 'login.jpg'
        validators:
          required: true
      - type: divider
        title: _('Standby Screen')
      - type: textInput
        name: standbyimage
        label: _('Standby screen image')
        hint: _('Filename of the JPEG image, e.g., standby.jpg')
        value: 'standby.jpg'
        validators:
          required: true
      - type: divider
        title: _('Shutdown Screen')
      - type: textInput
        name: shutdownimage
        label: _('Shutdown screen image')
        hint: _('Filename of the JPEG image, e.g., shutdown.jpg')
        value: 'shutdown.jpg'
        validators:
          required: true
    buttons:
      - template: submit
      - template: cancel
        execute:
          type: url
          url: "/system"
      - text: _('Reset to Defaults')
        execute:
          type: request
          request:
            service: CustomImages
            method: resetSettings
            successNotification: _("Images and Blend Modes have been reset to defaults.")
            successUrl: "/system"
