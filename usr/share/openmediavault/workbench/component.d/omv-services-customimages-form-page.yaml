version: "1.0"
type: component
data:
  name: omv-services-customimages-form-page
  type: formPage
  config:
    request:
      service: CustomImages
      get:
        method: getSettings
      post:
        method: setSettings
    fields:
      - type: textarea
        name: loginimage
        label: _('Login screen image')
        hint: _('Absolute path to the JPEG file, e.g., /srv/dev-disk-by-uuid-xxx/logo.jpg')
        rows: 1
        validators:
          required: true
      - type: select
        name: blendmode
        label: _('Blend Mode')
        hint: _('Blend mode for the login image')
        value: 'normal'
        store:
          data:
            - ['normal', _('Normal')]
            - ['hard-light', _('Hard Light')]
        validators:
          required: true
    buttons:
      - template: submit
      - template: cancel
        execute:
          type: url
          url: "/services"
