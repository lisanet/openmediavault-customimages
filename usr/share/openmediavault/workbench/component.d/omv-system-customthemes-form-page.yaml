version: "1.0"
type: component
data:
  name: omv-system-customthemes-form-page
  type: formPage
  config:
    request:
      service: CustomThemes
      get:
        method: getSettings
      post:
        method: setSettings
    hints:
      - type: info
        text: _("A set of images is provided in '/usr/share/openmediavault/customthemes/' and in '/usr/share/openmediavault/customthemes/default/'.")
        dismissible: true
    fields:
      - type: divider
        title: _('Themes')
      - type: checkbox
        name: lighttheme
        label: _('Light Theme')
        hint: _('New light color theme.')
        value: false
      - type: checkbox
        name: darktheme
        label: _('Dark Theme')
        hint: _('Slightly modified dark color theme.')
        value: false
      - type: checkbox
        name: removecursor
        label: _('Remove pixelated Amiga cursor')
        hint: _('Remove the pixelated Amiga cursor and replace it with the default cursor of the browser. You may need to reload the page and clear the browser cache to see the changes.')
        value: false
      - type: divider
        title: _('Colors')
      - type: checkbox
        name: customcolor
        label: _('Custom Color')
        hint: _('Enable custom color for themes. If disabled, the default openmediavault colors are used. You may need to reload the page and clear the browser cache to see the changes.')
        value: false
      - type: select
        name: hue
        label: _('Color')
        hint: _('Color for both themes, light and dark.')
        value: 200
        modifiers:
          - type: enabled
            constraint:
              operator: truthy
              arg0:
                prop: customcolor
        store:
          data:
            - value: 0
              text: _('Berry')
            - value: 70
              text: _('Citrus')
            - value: 140
              text: _('Lime')
            - value: 200
              text: _('Sky')
            - value: 260
              text: _('Plum')
            - value: 330
              text: _('Rose')
      - type: divider
        title: _('Wallpapers')
      - type: hidden
        name: rootfsref
        value: "79684322-3eac-11ea-a974-63a080abab18"
        submitValue: false
      - type: folderBrowser
        name: imagefolder
        label: _('Custom images folder')
        hint: _('Absolute path to the folder containing the custom images, e.g., /srv/dev-disk-by-uuid-xxx/some/path/')
        value: '/usr/share/openmediavault/customthemes/'
        dirType: mntent
        dirRefIdField: rootfsref
      - type: textInput
        name: loginimage
        label: _('Login screen image')
        hint: _('Filename of the JPEG image, e.g., login.jpg')
        value: 'login.jpg'
        validators:
          required: true
      - type: textInput
        name: standbyimage
        label: _('Standby screen image')
        hint: _('Filename of the JPEG image, e.g., standby.jpg')
        value: 'standby.jpg'
        validators:
          required: true
      - type: textInput
        name: shutdownimage
        label: _('Shutdown screen image')
        hint: _('Filename of the JPEG image, e.g., shutdown.jpg')
        value: 'shutdown.jpg'
        validators:
          required: true
    buttons:
      - template: submit
      - template: cancel
        execute:
          type: url
          url: "/system"
      - text: _('Reset to Defaults')
        execute:
          type: request
          request:
            service: CustomThemes
            method: resetSettings
            successNotification: _("Themes, Colors and Wallpapers have been reset to omv defaults.")
            successUrl: "/system"
